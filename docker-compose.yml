services:
  postgres:
    image: postgres:16-alpine
    container_name: smb-monitor-postgres
    environment:
      POSTGRES_DB: smb_monitor
      POSTGRES_USER: smb_monitor
      POSTGRES_PASSWORD: smb_monitor_dev_password
    ports:
      - "5432:5432"
    volumes:
      - smb_monitor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smb_monitor -d smb_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smb_monitor_postgres_data:
