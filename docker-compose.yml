services:
  mariadb:
    image: mariadb:10.11
    container_name: smb-monitor-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: smb_monitor
      MARIADB_USER: smb_monitor
      MARIADB_PASSWORD: smb_monitor_dev_password
      MARIADB_ROOT_PASSWORD: smb_monitor_root_password
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - smb_monitor_mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -usmb_monitor -psmb_monitor_dev_password --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smb_monitor_mariadb_data:
